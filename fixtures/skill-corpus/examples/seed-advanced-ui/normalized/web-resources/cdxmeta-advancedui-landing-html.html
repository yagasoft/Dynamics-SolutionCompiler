<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Codex Metadata Advanced UI</title>
  <style>
    :root { color-scheme: light; font-family: Segoe UI, Arial, sans-serif; }
    body { margin: 0; padding: 32px; background: linear-gradient(180deg, #eef4ff 0%, #f8fafc 100%); color: #1f2937; }
    main { max-width: 760px; margin: 0 auto; background: #fff; border: 1px solid #d8e1ef; border-radius: 18px; padding: 28px; box-shadow: 0 12px 36px rgba(15, 23, 42, 0.09); }
    h1 { margin-top: 0; font-size: 30px; }
    p { line-height: 1.65; }
    code { background: #e8eefc; padding: 0 0.3rem; border-radius: 4px; }
    .pill { display: inline-block; margin-right: 8px; margin-bottom: 8px; padding: 4px 10px; border-radius: 999px; background: #dbeafe; color: #1d4ed8; font-size: 12px; }
  </style>
</head>
<body>
  <main>
    <h1>Codex Metadata Advanced UI</h1>
    <p>This neutral app-shell scaffold exists to exercise advanced UI synthesis, solution analysis, and drift reasoning without introducing project-specific assumptions.</p>
    <p>
      <span class="pill">App shell</span>
      <span class="pill">Sitemap</span>
      <span class="pill">Web resources</span>
      <span class="pill">Environment variables</span>
    </p>
    <p>Mode: <code>seed</code></p>
  </main>
</body>
</html>
